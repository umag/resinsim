# Elegoo Ceramic Grey V2
# Sources: Elegoo published mechanical specs (tensile_strength_mpa)
# Optical/adhesion values estimated from ceramic-filled resin literature
# Calibrate penetration_depth_um and peel_adhesion_kpa with Athena II data

name = "Elegoo Ceramic Grey V2"

# Optical (Beer-Lambert) — ceramic particles scatter, shallower than generic
penetration_depth_um = 145.0
critical_energy_mj_cm2 = 5.5

# Mechanical — Elegoo published spec
tensile_strength_mpa = 38.0
peel_adhesion_kpa = 9.5            # ceramic-filled: lower FEP adhesion than standard 13.0
ref_lift_speed_mm_min = 60.0       # measurement speed for peel_adhesion_kpa (KB-112, ADR-0005 §3)

# Shrinkage — ceramic-constrained
linear_shrinkage_pct = 0.9

# Thermal/Viscosity — higher viscosity from ceramic filler
viscosity_mpa_s = 350.0
reference_temp_c = 25.0
activation_energy_kj_mol = 52.0

# Density — ceramic filler increases density
density_g_cm3 = 1.25

# Thermal safety thresholds
degradation_temp_c = 50.0
min_safe_temp_c = 15.0

# Recipe (ADR-0005 Axis 2b) — ceramic-filled resin needs thinner layers + longer cure.
# Sources: Mag's calibrated value (30 µm) — ceramic particles scatter UV and the
# Dp=145 µm penetration depth supports thinner layers than the original 40 µm
# estimate. Higher viscosity (KB-141) slows peel, so 30 µm + the longer cure
# below is the calibrated operating point. Elegoo vendor recommendations for
# ceramic-filled Mars-class resins.
[recipe]
layer_height_um = 30.0
bottom_layer_count = 8
transition_layers = 4
normal_exposure_sec = 3.2
bottom_exposure_sec = 35.0
wait_before_cure_sec = 0.8
wait_before_release_sec = 1.5
wait_after_release_sec = 0.0
lift_speed_mm_min = 50.0
lift_cycle_sec = 8.5
lift_distance_mm = 5.0
