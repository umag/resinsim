# Generic Standard Resin — conservative defaults from KB data
# Based on Liqcreate Premium Black (KB-100) and general measurements (KB-140, KB-141)

name = "Generic Standard"

# Optical (Beer-Lambert) — KB-100
penetration_depth_um = 170.0
critical_energy_mj_cm2 = 5.0

# Mechanical — KB-140
tensile_strength_mpa = 35.0
peel_adhesion_kpa = 13.0    # KB-110: standard FEP
# KB-116 / ADR-0022 Stage 1: first-layer base-adhesion σ-elevation (oxygen-freshness),
# relaxing exponentially over ~bottom_layer_count layers. INDICATIVE — fit to a single
# Athena print (peak layer 15→0, corr 0.821→0.948, fit R² 0→0.56); NOT yet a properly
# fitted coefficient (ADR-0022 defers per-stratum fitting to the E-series). Treat like
# the cure_kinetics_ea default: best current estimate, refine with calibration data.
base_adhesion_elevation_kpa = 40.0
# KB-185 / ADR-0022 Stage 3: aspect-ratio (A/L) peel shape-factor strength,
# dimensionless in [0, 1]. Modulates σ_peel by each layer's compactness — a thin,
# high-aspect cross-section peels at lower force than a compact one of equal area
# (Pan Fig.9). INDICATIVE — 0.5 reproduces the measured 314 mm² cylinder→star
# force ratio (0.795); the source is PDMS/DLP, NOT yet fit to Athena II (nFEP), so
# treat it like base_adhesion_elevation_kpa: best current estimate, refine with an
# equal-area shape-sweep (ADR-0022 defers per-stratum fitting to the E-series).
peel_shape_factor_strength = 0.5
ref_lift_speed_mm_min = 60.0  # measurement speed for peel_adhesion_kpa (KB-112, KB-114, ADR-0005 §3)

# Shrinkage — KB-142
linear_shrinkage_pct = 1.5

# Linear elasticity (post-cure) — KB-163. Literature-midpoint values for a
# Premium-Black-class photopolymer; ν strictly < 0.5 (incompressible limit).
youngs_modulus_mpa = 2000.0
poissons_ratio = 0.35

# Thermal/Viscosity — KB-141
viscosity_mpa_s = 200.0
reference_temp_c = 25.0
activation_energy_kj_mol = 52.0  # KB-150: derived from 82% drop

# Density
density_g_cm3 = 1.1

# Thermal safety thresholds — KB-150
degradation_temp_c = 50.0
min_safe_temp_c = 15.0

# Recipe (ADR-0005 Axis 2b) — concrete operating point for this resin
# Matches the recipe previously baked into generic_msla_4k (KB-171 RERF defaults).

# Thermal material properties (ADR-0020 / t2f4 thermal diffusion).
# Literature midpoints for neat acrylate photopolymer.
thermal_conductivity_w_mk = 0.20
specific_heat_j_kgk = 1700.0
convective_top_h_w_m2k = 10.0   # still-air natural convection at resin top

[recipe]
layer_height_um = 50.0
bottom_layer_count = 6
transition_layers = 3
normal_exposure_sec = 2.5
bottom_exposure_sec = 25.0
wait_before_cure_sec = 0.5
wait_before_release_sec = 1.0
wait_after_release_sec = 0.0
lift_speed_mm_min = 60.0
lift_cycle_sec = 7.5
lift_distance_mm = 5.0
