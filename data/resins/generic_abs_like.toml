# Generic ABS-Like Resin — based on Elegoo ABS-Like V2 (KB-140, KB-142)

name = "Generic ABS-Like"

# Optical — estimated, Elegoo does not publish (KB-180)
penetration_depth_um = 150.0
critical_energy_mj_cm2 = 8.0

# Mechanical — KB-140: Elegoo ABS-Like V2
tensile_strength_mpa = 45.0
peel_adhesion_kpa = 13.0
ref_lift_speed_mm_min = 60.0       # measurement speed for peel_adhesion_kpa (KB-112, ADR-0005 §3)

# Shrinkage — KB-142: Elegoo ABS-Like V2
linear_shrinkage_pct = 2.4  # ~7.1% volumetric / 3

# Linear elasticity (post-cure) — KB-163. ABS-like resins are tougher
# (Elegoo published spec ~2200–2400 MPa); ν slightly higher than standard.
youngs_modulus_mpa = 2300.0
poissons_ratio = 0.38

# Thermal/Viscosity — KB-141
viscosity_mpa_s = 175.0     # KB-141: 150-200 mPa·s
reference_temp_c = 25.0
activation_energy_kj_mol = 52.0

# Density
density_g_cm3 = 1.12

# Thermal safety thresholds — KB-150
degradation_temp_c = 50.0
min_safe_temp_c = 15.0

# Recipe (ADR-0005 Axis 2b) — ABS-like needs longer cure (higher Ec = 8.0), tougher
# material typically benefits from heavier raft. Baseline values per Elegoo vendor
# recommendations for ABS-Like V2; TODO: calibrate exposure on Athena II (E1).

# Thermal material properties (ADR-0020 / t2f4 thermal diffusion).
# ABS-like photopolymer — slightly lower conductivity than neat acrylate,
# polymer-matrix-dominated heat capacity.
thermal_conductivity_w_mk = 0.19
specific_heat_j_kgk = 1700.0
convective_top_h_w_m2k = 10.0   # still-air natural convection at resin top

[recipe]
layer_height_um = 50.0
bottom_layer_count = 8
transition_layers = 4
normal_exposure_sec = 3.5
bottom_exposure_sec = 35.0
wait_before_cure_sec = 0.5
wait_before_release_sec = 1.2
wait_after_release_sec = 0.0
lift_speed_mm_min = 55.0
lift_cycle_sec = 8.0
lift_distance_mm = 5.0
