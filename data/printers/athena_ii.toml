# Athena II — Concepts3D reference printer with force sensor
# Hardware envelope only (ADR-0005). Recipe fields moved to ResinProfile.recipe.
# Ranges are wide-but-documented pre-calibration per ADR-0005 + EXPERIMENT-PLAN-v1.1.md.
# Tighten via follow-up issue once E1-E3 calibration data is collected.

name = "Athena II"

# Light source
led_power_mw_cm2 = 5.0
pixel_pitch_um = 35.0

# Hardware envelope (ADR-0005 Axis 1)
# TODO: tighten ranges after Athena II calibration (resinsim/spec/EXPERIMENT-PLAN-v1.1.md).
# Current ranges are intentionally permissive; pairing protection is weak until calibration.
layer_height_range_um = { min = 15.0, max = 200.0 }
exposure_range_sec = { min = 0.5, max = 60.0 }
lift_speed_range_mm_min = { min = 10.0, max = 300.0 }
bottom_layer_count_max = 20

# Z-axis — estimated premium (ball screw)
z_stiffness_n_per_mm = 1500.0

# Thermal — pending KB-183 measurement
delta_t_steady_c = 8.0
thermal_tau_sec = 1500.0

# LCD uniformity — KB-120 (estimated, better than consumer)
lcd_uniformity_variation = 0.10
