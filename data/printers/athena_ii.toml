# Athena II — Concepts3D reference printer with force sensor
# Hardware envelope only (ADR-0005). Recipe fields moved to ResinProfile.recipe.
# Ranges are wide-but-documented pre-calibration per ADR-0005 + EXPERIMENT-PLAN-v1.1.md.
# Tighten via follow-up issue once E1-E3 calibration data is collected.

name = "Athena II"

# Light source
led_power_mw_cm2 = 5.0
pixel_pitch_um = 35.0

# Hardware envelope (ADR-0005 Axis 1)
# TODO: tighten ranges after Athena II calibration (resinsim/spec/EXPERIMENT-PLAN-v1.1.md).
# Current ranges are intentionally permissive; pairing protection is weak until calibration.
layer_height_range_um = { min = 15.0, max = 200.0 }
exposure_range_sec = { min = 0.5, max = 60.0 }
lift_speed_range_mm_min = { min = 10.0, max = 300.0 }
bottom_layer_count_max = 20

# Z-axis — estimated premium (ball screw)
z_stiffness_n_per_mm = 1500.0

# Thermal — pending KB-183 measurement
delta_t_steady_c = 8.0
thermal_tau_sec = 1500.0

# LCD uniformity — KB-120 (estimated, better than consumer)
lcd_uniformity_variation = 0.10

# Suction ΔP for sealed cavities (ADR-0022 Stage 2 / KB-184). Optional — when
# unset (as here) the sim inherits the 50 kPa indicative default. The true
# magnitude is a 50–101 kPa data gap; calibrate with sealed-vs-drained cup pairs
# (KB-173) on the Athena II force sensor before setting a measured value.
# vacuum_pressure_kpa = 50.0

# Vat-wall + convective BC properties (ADR-0020 / t2f4 thermal diffusion).
# Athena II vat geometry approximated as typical Al-alloy frame; recalibrate
# once measured. (Top-level scalars MUST precede any [table] block in TOML.)
convective_wall_h_w_m2k = 8.0   # still-air natural convection (W/m²·K)
vat_wall_thickness_mm = 2.0     # typical Al-alloy vat
vat_wall_k_w_mk = 200.0         # Al alloy thermal conductivity (W/m·K)

# Build envelope (ADR-0012 + ADR-0020 §Decision ii — required under field-sim).
# ESTIMATE pending Athena II calibration. Values use the published outer
# dimensions; refine with measured plate envelope once E1-E3 calibration data
# is collected (resinsim/spec/EXPERIMENT-PLAN-v1.1.md).
[build_envelope_mm]
width_mm = 175.0    # estimate, pending Athena II measurement
depth_mm = 110.0    # estimate
max_z_mm = 220.0    # estimate (premium ball-screw Z)
