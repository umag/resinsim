# Generic MSLA 4K Printer — conservative defaults from KB data
# Hardware envelope only (ADR-0005). Recipe fields moved to ResinProfile.recipe.

name = "Generic MSLA 4K"

# Light source — KB-121
led_power_mw_cm2 = 4.0
pixel_pitch_um = 50.0

# Hardware envelope (ADR-0005 Axis 1)
# Ranges conservatively subsume the previous baked recipe (layer=50, exposure=2.5, lift=60)
# which now lives in ResinProfile::generic_standard().recipe.
layer_height_range_um = { min = 20.0, max = 100.0 }
exposure_range_sec = { min = 1.0, max = 60.0 }
lift_speed_range_mm_min = { min = 10.0, max = 200.0 }
bottom_layer_count_max = 15

# Z-axis — KB-131
z_stiffness_n_per_mm = 460.0

# Thermal — KB-183 (estimates)
delta_t_steady_c = 10.0
thermal_tau_sec = 1200.0

# LCD uniformity — KB-120
lcd_uniformity_variation = 0.22

# Vat-wall + convective BC properties (ADR-0020 / t2f4 thermal diffusion).
# Generic 4K class — conservative literature midpoints, no per-printer calibration.
# (Top-level scalars MUST precede any [table] block in TOML.)
convective_wall_h_w_m2k = 8.0   # still-air natural convection (W/m²·K)
vat_wall_thickness_mm = 2.0     # typical Al-alloy vat
vat_wall_k_w_mk = 200.0         # Al alloy thermal conductivity (W/m·K)

# Build envelope (ADR-0012). Typical 8.9" / 4K monoLCD class.
[build_envelope_mm]
width_mm = 192.0
depth_mm = 120.0
max_z_mm = 200.0
