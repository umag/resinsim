# Elegoo Mars 5 Ultra — 12K mono LCD, ParaLED matrix, triple linear rail Z-axis
# Sources: Elegoo published specs (build volume, resolution, pixel pitch).
# Hardware envelope only (ADR-0005). Recipe fields live on ResinProfile.recipe.

name = "Elegoo Mars 5 Ultra"

# Light source
led_power_mw_cm2 = 20.0           # ParaLED matrix, 12K mono LCD
pixel_pitch_um = 19.0              # 218.88 mm / 11520 px

# Hardware envelope (ADR-0005 Axis 1)
# Ranges derived from Elegoo spec sheet + published recipe range (Mars class).
layer_height_range_um = { min = 10.0, max = 150.0 }
exposure_range_sec = { min = 0.5, max = 60.0 }
lift_speed_range_mm_min = { min = 10.0, max = 300.0 }
bottom_layer_count_max = 20

# Z-axis — triple linear rail (estimated; KB-131 Mars class = 460, Mars 5 Ultra ~900)
z_stiffness_n_per_mm = 900.0

# Thermal
delta_t_steady_c = 8.0
thermal_tau_sec = 1200.0

# LCD uniformity — ParaLED design, better than Saturn-class (0.22)
lcd_uniformity_variation = 0.12

# Suction ΔP for sealed cavities (ADR-0022 Stage 2 / KB-184). Optional — unset
# inherits the 50 kPa indicative default (the 50–101 kPa magnitude is a data gap).
# vacuum_pressure_kpa = 50.0

# Release mechanism (ADR-0007) — Mars 5 Ultra uses tilting vat release, not
# straight-up build-plate lift. See docs/adr/0007-led-and-vat-as-separate-temperatures.md.
release_mechanism = "tilt"

# LED thermal calibration (KB-152) — fitted from data/elegoo/ overnight session.
# DELTA semantics (rise above initial_led_c), parallels delta_t_steady_c.
led_delta_t_steady_c = 13.5   # plateau ~40.5 °C − idle ~27 °C
led_tau_sec = 4000.0          # 3–4 h to 95 % of plateau (3τ ≈ 3–4 h)
led_to_vat_coupling = 0.71    # user estimate (no vat sensor); recalibrate when added

# Light crosstalk σ values (ADR-0018 / t2f2). Both ESTIMATE pending Athena II
# beam-profile fit. σ values are in physical µm; converted at runtime to
# per-axis voxel-index kernels via the storage's anisotropic conversion factors.
#
# σ_xy = 8 µm — cross-checked against two independent derivations:
#   (1) KB-121 LED/LCD geometry: pixel_pitch_um × tan(5–10° collimation half-angle)
#       ≈ 8 µm for 19 µm pixel pitch and typical mSLA collimation.
#   (2) Wei et al. PMC11267290 ("Voxel Design of Grayscale DLP 3D-Printed
#       Soft Robots"): reported ω₀ = 30 µm at 42 µm pixel pitch → σ = ω₀/2 = 15 µm
#       → ratio σ/pixel_pitch ≈ 0.36 → applied to 19 µm pitch gives σ ≈ 6.8 µm.
#   Two derivations agree within 20%. 8 µm is a defensible conservative round.
#
# σ_z = 40 µm — mid-range of typical photopolymer scatter mean-free-path
#   (20–80 µm). Volumetric resin scatter parameter, calibratable independently
#   from beam-profile measurements through cured-layer thickness deviation.
#
# Both values flagged ESTIMATE — re-fit jointly from Athena II beam-profile
# measurement campaign (follow-up ticket).
#
# NB: discovered during t2f4 — these were previously placed AFTER
# [build_envelope_mm] which silently nested them inside that table (TOML
# scoping rule). The values were unread by serde; t2f2 crosstalk has been
# effectively OFF for Mars 5 Ultra since shipping. Restoration here AND
# co-located with the new t2f4 thermal scalars to prevent regression.
crosstalk_sigma_xy_um = 8.0
crosstalk_sigma_z_um = 40.0

# Vat-wall + convective BC properties (ADR-0020 / t2f4 thermal diffusion).
# Mars 5 Ultra has a typical Al-alloy vat frame.
# (Top-level scalars MUST precede any [table] block in TOML.)
convective_wall_h_w_m2k = 8.0   # still-air natural convection (W/m²·K)
vat_wall_thickness_mm = 2.0     # typical Al-alloy vat
vat_wall_k_w_mk = 200.0         # Al alloy thermal conductivity (W/m·K)

# Build envelope (ADR-0012). Elegoo published spec.
[build_envelope_mm]
width_mm = 153.36
depth_mm = 77.76
max_z_mm = 165.0
