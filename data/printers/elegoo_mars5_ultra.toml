# Elegoo Mars 5 Ultra — 12K mono LCD, ParaLED matrix, triple linear rail Z-axis
# Sources: Elegoo published specs (build volume, resolution, pixel pitch).
# Hardware envelope only (ADR-0005). Recipe fields live on ResinProfile.recipe.

name = "Elegoo Mars 5 Ultra"

# Light source
led_power_mw_cm2 = 20.0           # ParaLED matrix, 12K mono LCD
pixel_pitch_um = 19.0              # 218.88 mm / 11520 px

# Hardware envelope (ADR-0005 Axis 1)
# Ranges derived from Elegoo spec sheet + published recipe range (Mars class).
layer_height_range_um = { min = 10.0, max = 150.0 }
exposure_range_sec = { min = 0.5, max = 60.0 }
lift_speed_range_mm_min = { min = 10.0, max = 300.0 }
bottom_layer_count_max = 20

# Z-axis — triple linear rail (estimated; KB-131 Mars class = 460, Mars 5 Ultra ~900)
z_stiffness_n_per_mm = 900.0

# Thermal
delta_t_steady_c = 8.0
thermal_tau_sec = 1200.0

# LCD uniformity — ParaLED design, better than Saturn-class (0.22)
lcd_uniformity_variation = 0.12

# Release mechanism (ADR-0007) — Mars 5 Ultra uses tilting vat release, not
# straight-up build-plate lift. See docs/adr/0007-led-and-vat-as-separate-temperatures.md.
release_mechanism = "tilt"
